[phases.setup]
nixPkgs = ["dotnet-sdk_7"]

[phases.install]
cmds = [
  "dotnet restore Backend/PortfolioBackend.csproj"
]

[phases.build]
cmds = [
  "dotnet publish Backend/PortfolioBackend.csproj -c Release -o /app/publish",
  "mkdir -p /app/publish/wwwroot",
  "cp -r Frontend/. /app/publish/wwwroot/"
]

[start]
cmd = "cd /app/publish && dotnet PortfolioBackend.dll"
